name: Release

# Publishes to PyPI when a GitHub Release is published.
# Auth is via PyPI Trusted Publishing (OIDC) -- no API token is stored anywhere.
# See RELEASING.md for the one-time PyPI setup.

on:
  release:
    types: [published]
  workflow_dispatch: # allows a dry run to TestPyPI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build sdist and wheel
        run: uvx --from build pyproject-build --installer uv .

      - name: Check metadata
        run: uvx twine check dist/*

      - name: Verify the tag matches the package version
        if: github.event_name == 'release'
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION=$(uvx --from tomli python -c "import tomli,pathlib; print(tomli.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "tag=$TAG version=$VERSION"
          if [ "${TAG#v}" != "$VERSION" ]; then
            echo "::error::Tag '$TAG' does not match pyproject version '$VERSION'"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/django-widget-renderers
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
